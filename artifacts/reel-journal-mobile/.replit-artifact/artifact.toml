kind = "mobile"
previewPath = "/mobile/"
title = "Reel Journal Mobile"
version = "1.0.0"
id = "artifacts/reel-journal-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20646

[services.development]
run = "pnpm --filter @workspace/reel-journal-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reel-journal-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/reel-journal-mobile", "run", "serve" ]

[services.env]
PORT = "20646"
BASE_PATH = "/mobile/"
